<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Heat Shield Dashboard</title>

    <!-- PWA / installable web app -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#eef1f7" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <!-- iOS home-screen web app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Heat Shield" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <main style="padding: 16px; color: #e6edf3; background: #0d1117;">
        <h1>Heat Shield Dashboard</h1>
        <p>Bitte JavaScript aktivieren, um das Dashboard anzuzeigen.</p>
      </main>
    </noscript>
    <script src="/app.js" defer></script>
    <script>
      // Register the service worker so the dashboard is installable
      // and opens offline. Failures are non-fatal — the SPA works
      // without it.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function () {
            /* SW registration is best-effort */
          });
        });
      }
    </script>
  </body>
</html>
